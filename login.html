<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập | STORE</title>
  <meta name="description" content="Đăng nhập vào tài khoản STORE để quản lý đơn hàng, địa chỉ và thông tin cá nhân của bạn." />
  <meta name="keywords" content="đăng nhập, tài khoản, store" />
  <meta name="author" content="STORE" />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://store.example.com/login.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Đăng nhập | STORE" />
  <meta property="og:description" content="Đăng nhập vào tài khoản STORE." />
  <meta property="og:site_name" content="STORE" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';}catch(e){}})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { bg:'var(--bg)','bg-2':'var(--bg-2)','bg-3':'var(--bg-3)',surface:'var(--surface)',t1:'var(--text-1)',t2:'var(--text-2)',t3:'var(--text-3)',accent:'var(--accent)','accent-fg':'var(--accent-fg)' },
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/app.js"></script>
</head>

<body class="font-sans bg-2 min-h-screen flex flex-col">
  <a href="#main" class="skip-link">Bỏ qua tới nội dung chính</a>

  <header class="py-4">
    <div class="container-c flex items-center justify-between">
      <a href="index.html" class="logo">STORE</a>
      <button class="icon-btn" x-data @click="$store.theme.toggle()" aria-label="Chuyển giao diện sáng/tối">
        <svg x-show="!$store.theme.isDark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg x-show="$store.theme.isDark" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main id="main" class="flex-1 flex items-center justify-center px-5 py-10">
    <div class="card w-full" style="max-width:400px;padding:40px"
         x-data="{
           email:'', password:'', remember:false, show:false,
           errors:{}, submitted:false,
           validate(){
             this.errors = {};
             if(!isValidEmail(this.email)) this.errors.email='Email không hợp lệ';
             if(this.password.length < 6) this.errors.password='Mật khẩu tối thiểu 6 ký tự';
             return Object.keys(this.errors).length === 0;
           },
           submit(){ if(this.validate()){ this.submitted=true; } }
         }">
      <div class="text-center mb-7">
        <a href="index.html" class="logo">STORE</a>
        <h1 class="text-2xl font-semibold mt-3">Đăng nhập</h1>
        <p class="text-2 text-sm mt-1">Chào mừng bạn quay trở lại</p>
      </div>

      <div x-show="submitted" x-cloak class="status status-done block text-center mb-4" style="padding:10px">
        Đăng nhập thành công (demo)!
      </div>

      <form @submit.prevent="submit()" novalidate>
        <div class="mb-4">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" class="input" x-model="email" placeholder="you@example.com" autocomplete="email" />
          <span class="field-error" x-show="errors.email" x-text="errors.email" x-cloak></span>
        </div>

        <div class="mb-4">
          <label class="field-label" for="password">Mật khẩu</label>
          <div class="relative">
            <input id="password" :type="show ? 'text':'password'" class="input" style="padding-right:44px" x-model="password" placeholder="••••••" autocomplete="current-password" />
            <button type="button" class="icon-btn" style="position:absolute;right:2px;top:50%;transform:translateY(-50%)" @click="show=!show" :aria-label="show ? 'Ẩn mật khẩu':'Hiện mật khẩu'">
              <svg x-show="!show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="show" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.9 4.2A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13 13 0 0 1-2.2 3M6.6 6.6A13 13 0 0 0 2 11s3.5 7 10 7a9 9 0 0 0 3.4-.6M1 1l22 22"/></svg>
            </button>
          </div>
          <span class="field-error" x-show="errors.password" x-text="errors.password" x-cloak></span>
        </div>

        <div class="flex items-center justify-between mb-5 text-sm">
          <label class="flex items-center gap-2 text-2 cursor-pointer">
            <input type="checkbox" x-model="remember" /> Nhớ tôi
          </label>
          <a href="#" class="text-2 hover:text-t1">Quên mật khẩu?</a>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
      </form>

      <div class="flex items-center gap-3 my-5 text-3 text-sm">
        <hr class="divider flex-1" /> hoặc <hr class="divider flex-1" />
      </div>

      <button class="btn btn-outline btn-block">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.3c0-.8-.1-1.4-.2-2H12v4h6c-.1 1-.8 2.4-2.2 3.4l-.1.1 3.2 2.5.2.1c2-1.9 3.2-4.7 3.2-8.1z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.1-2.6l-3.4-2.6c-.9.6-2.1 1-3.7 1-2.8 0-5.2-1.9-6.1-4.5l-.1.1-3.3 2.6-.1.1C4.1 20.5 7.8 23 12 23z"/><path fill="#FBBC05" d="M5.9 14.3c-.2-.7-.4-1.4-.4-2.3s.1-1.6.4-2.3l-.1-.2L2.5 7l-.2.1C1.5 8.5 1 10.2 1 12s.5 3.5 1.3 4.9l3.6-2.6z"/><path fill="#EA4335" d="M12 5.5c2 0 3.3.9 4.1 1.6l3-2.9C17.4 1.5 14.9.5 12 .5 7.8.5 4.1 3 2.3 7.1l3.6 2.6C6.8 7.1 9.2 5.5 12 5.5z"/></svg>
        Tiếp tục với Google
      </button>

      <p class="text-center text-sm text-2 mt-6">
        Chưa có tài khoản? <a href="register.html" class="text-1 font-medium hover:underline">Đăng ký</a>
      </p>
    </div>
  </main>
</body>
</html>
