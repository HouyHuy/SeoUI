<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giỏ hàng | STORE</title>
  <meta name="description" content="Xem lại giỏ hàng của bạn, điều chỉnh số lượng, áp dụng mã giảm giá và tiến hành thanh toán tại STORE." />
  <meta name="keywords" content="giỏ hàng, thanh toán, mua sắm, store" />
  <meta name="author" content="STORE" />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://store.example.com/cart.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Giỏ hàng | STORE" />
  <meta property="og:description" content="Giỏ hàng của bạn tại STORE." />
  <meta property="og:site_name" content="STORE" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';}catch(e){}})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { bg:'var(--bg)','bg-2':'var(--bg-2)','bg-3':'var(--bg-3)',surface:'var(--surface)',t1:'var(--text-1)',t2:'var(--text-2)',t3:'var(--text-3)',accent:'var(--accent)','accent-fg':'var(--accent-fg)' },
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>

<body class="font-sans">
  <a href="#main" class="skip-link">Bỏ qua tới nội dung chính</a>

  <header class="site-header" x-data="header">
    <div class="container-c h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="logo">STORE</a>
      <nav class="hidden md:flex items-center gap-8" aria-label="Điều hướng chính">
        <a href="index.html" class="nav-link">Trang chủ</a>
        <a href="index.html#products" class="nav-link">Sản phẩm</a>
        <a href="contact.html" class="nav-link">Liên hệ</a>
      </nav>
      <div class="flex items-center gap-1">
        <a href="cart.html" class="icon-btn" aria-label="Giỏ hàng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.6 13a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          <span class="cart-badge" x-show="$store.cart.count > 0" x-text="$store.cart.count" x-cloak></span>
        </a>
        <button class="icon-btn" @click="$store.theme.toggle()" aria-label="Chuyển giao diện sáng/tối">
          <svg x-show="!$store.theme.isDark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg x-show="$store.theme.isDark" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <button class="icon-btn md:hidden" @click="open()" aria-label="Mở menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg></button>
      </div>
    </div>
    <template x-teleport="body">
      <div x-show="mobileOpen" x-cloak>
        <div class="drawer-overlay" @click="close()"></div>
        <aside class="drawer">
          <div class="flex items-center justify-between mb-8"><span class="logo">STORE</span>
            <button class="icon-btn" @click="close()" aria-label="Đóng menu"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
          <nav class="flex flex-col gap-2">
            <a href="index.html" class="py-2 nav-link">Trang chủ</a>
            <a href="index.html#products" class="py-2 nav-link">Sản phẩm</a>
            <a href="contact.html" class="py-2 nav-link">Liên hệ</a>
          </nav>
        </aside>
      </div>
    </template>
  </header>

  <main id="main" class="container-c py-10" x-data="cartPage()" x-init="$nextTick(() => $store.cart.sync())">
    <h1 class="text-2xl font-semibold mb-6">Giỏ hàng</h1>

    <!-- Empty state -->
    <div x-show="$store.cart.items.length === 0" x-cloak class="text-center py-24">
      <div class="text-6xl mb-4 opacity-30">🛒</div>
      <p class="text-2 mb-6">Giỏ hàng của bạn đang trống.</p>
      <a href="index.html#products" class="btn btn-primary">Tiếp tục mua sắm</a>
    </div>

    <!-- Cart with items -->
    <div x-show="$store.cart.items.length > 0" x-cloak class="grid lg:grid-cols-[1fr_360px] gap-8 items-start">
      <!-- Items -->
      <div class="card p-2 md:p-4">
        <template x-for="(item, idx) in $store.cart.items" :key="item.key">
          <div>
            <div class="flex items-center gap-4 p-3">
              <div class="bg-3 rounded-c flex items-center justify-center shrink-0" style="width:60px;height:60px">
                <span class="opacity-30" x-text="item.name.charAt(0)"></span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="font-medium truncate" x-text="item.name"></p>
                <p class="text-2 text-xs" x-text="[item.size ? 'Size '+item.size : '', item.color ? 'Màu '+item.color : ''].filter(Boolean).join(' · ')"></p>
              </div>
              <div class="inline-flex items-center border-c rounded-c overflow-hidden shrink-0">
                <button class="icon-btn" style="width:34px;height:34px" @click="$store.cart.setQty(item.key, item.qty-1)" aria-label="Giảm">−</button>
                <span class="text-center text-sm" style="width:34px" x-text="item.qty"></span>
                <button class="icon-btn" style="width:34px;height:34px" @click="$store.cart.setQty(item.key, item.qty+1)" aria-label="Tăng">+</button>
              </div>
              <span class="font-medium w-24 text-right shrink-0" x-text="formatPrice(item.price * item.qty)"></span>
              <button class="icon-btn shrink-0" @click="$store.cart.remove(item.key)" aria-label="Xóa sản phẩm">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
              </button>
            </div>
            <hr class="divider mx-3" x-show="idx < $store.cart.items.length - 1" />
          </div>
        </template>
      </div>

      <!-- Summary -->
      <aside class="card p-6">
        <h2 class="text-lg font-semibold mb-5">Tóm tắt đơn hàng</h2>
        <div class="flex flex-col gap-3 text-sm">
          <div class="flex justify-between"><span class="text-2">Tạm tính</span><span x-text="formatPrice($store.cart.total)"></span></div>
          <div class="flex justify-between"><span class="text-2">Phí vận chuyển</span><span x-text="$store.cart.total >= 500000 ? 'Miễn phí' : formatPrice(shipping)"></span></div>
          <div class="flex justify-between" x-show="discount > 0" x-cloak><span class="text-2">Giảm giá</span><span style="color:var(--err)" x-text="'-' + formatPrice(discount)"></span></div>
        </div>
        <hr class="divider my-4" />
        <div class="flex justify-between items-baseline mb-5">
          <span class="font-medium">Tổng cộng</span>
          <span class="text-xl font-bold" x-text="formatPrice(grandTotal())"></span>
        </div>

        <div class="flex gap-2 mb-4">
          <input class="input" placeholder="Mã giảm giá" x-model="coupon" aria-label="Mã giảm giá" />
          <button class="btn btn-outline" @click="applyCoupon()">Áp dụng</button>
        </div>
        <p class="text-xs mb-4" x-show="couponMsg" x-cloak :style="`color:${discount>0?'var(--ok)':'var(--err)'}`" x-text="couponMsg"></p>

        <button class="btn btn-primary btn-block">Tiến hành thanh toán</button>
        <a href="index.html#products" class="btn btn-ghost btn-block mt-2">Tiếp tục mua sắm</a>
      </aside>
    </div>
  </main>

  <footer class="border-t-c bg-2 mt-20">
    <div class="border-t-c"><p class="container-c py-5 text-center text-sm text-3">© 2026 STORE. Đã đăng ký bản quyền.</p></div>
  </footer>

  <script>
    function cartPage() {
      return {
        shipping: 30000,
        coupon: "",
        discount: 0,
        couponMsg: "",
        applyCoupon() {
          const code = this.coupon.trim().toUpperCase();
          if (code === "STORE10") {
            this.discount = Math.round($store.cart.total * 0.1);
            this.couponMsg = "Áp dụng mã STORE10 — giảm 10%!";
          } else if (code === "") {
            this.couponMsg = "Vui lòng nhập mã giảm giá.";
            this.discount = 0;
          } else {
            this.discount = 0;
            this.couponMsg = "Mã giảm giá không hợp lệ.";
          }
        },
        grandTotal() {
          const ship = $store.cart.total >= 500000 ? 0 : this.shipping;
          return Math.max(0, $store.cart.total + ship - this.discount);
        }
      };
    }
  </script>
</body>
</html>
