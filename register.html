<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng ký | STORE</title>
  <meta name="description" content="Tạo tài khoản STORE để mua sắm nhanh hơn, theo dõi đơn hàng và nhận ưu đãi thành viên độc quyền." />
  <meta name="keywords" content="đăng ký, tạo tài khoản, store" />
  <meta name="author" content="STORE" />
  <meta name="robots" content="noindex, follow" />
  <link rel="canonical" href="https://store.example.com/register.html" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Đăng ký | STORE" />
  <meta property="og:description" content="Tạo tài khoản STORE." />
  <meta property="og:site_name" content="STORE" />
  <meta name="twitter:card" content="summary" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';}catch(e){}})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { bg:'var(--bg)','bg-2':'var(--bg-2)','bg-3':'var(--bg-3)',surface:'var(--surface)',t1:'var(--text-1)',t2:'var(--text-2)',t3:'var(--text-3)',accent:'var(--accent)','accent-fg':'var(--accent-fg)' },
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/app.js"></script>
</head>

<body class="font-sans bg-2 min-h-screen flex flex-col">
  <a href="#main" class="skip-link">Bỏ qua tới nội dung chính</a>

  <header class="py-4">
    <div class="container-c flex items-center justify-between">
      <a href="index.html" class="logo">STORE</a>
      <button class="icon-btn" x-data @click="$store.theme.toggle()" aria-label="Chuyển giao diện sáng/tối">
        <svg x-show="!$store.theme.isDark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        <svg x-show="$store.theme.isDark" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
  </header>

  <main id="main" class="flex-1 flex items-center justify-center px-5 py-10">
    <div class="card w-full" style="max-width:400px;padding:40px"
         x-data="{
           name:'', email:'', password:'', confirm:'', agree:false,
           show:false, errors:{}, submitted:false,
           get strength(){ return passwordStrength(this.password); },
           get strengthLabel(){ return ['','Yếu','Trung bình','Mạnh','Rất mạnh'][this.strength]; },
           get strengthColor(){ return ['transparent','#EF4444','#F59E0B','#22C55E','#0A0A0A'][this.strength]; },
           validate(){
             this.errors={};
             if(this.name.trim().length < 2) this.errors.name='Vui lòng nhập họ tên';
             if(!isValidEmail(this.email)) this.errors.email='Email không hợp lệ';
             if(this.password.length < 6) this.errors.password='Mật khẩu tối thiểu 6 ký tự';
             if(this.confirm !== this.password) this.errors.confirm='Mật khẩu xác nhận không khớp';
             if(!this.agree) this.errors.agree='Bạn cần đồng ý điều khoản';
             return Object.keys(this.errors).length===0;
           },
           submit(){ if(this.validate()){ this.submitted=true; } }
         }">
      <div class="text-center mb-7">
        <a href="index.html" class="logo">STORE</a>
        <h1 class="text-2xl font-semibold mt-3">Đăng ký</h1>
        <p class="text-2 text-sm mt-1">Tạo tài khoản mới chỉ trong 1 phút</p>
      </div>

      <div x-show="submitted" x-cloak class="status status-done block text-center mb-4" style="padding:10px">
        Đăng ký thành công (demo)!
      </div>

      <form @submit.prevent="submit()" novalidate>
        <div class="mb-4">
          <label class="field-label" for="name">Họ tên</label>
          <input id="name" type="text" class="input" x-model="name" placeholder="Nguyễn Văn A" autocomplete="name" />
          <span class="field-error" x-show="errors.name" x-text="errors.name" x-cloak></span>
        </div>
        <div class="mb-4">
          <label class="field-label" for="email">Email</label>
          <input id="email" type="email" class="input" x-model="email" placeholder="you@example.com" autocomplete="email" />
          <span class="field-error" x-show="errors.email" x-text="errors.email" x-cloak></span>
        </div>
        <div class="mb-4">
          <label class="field-label" for="password">Mật khẩu</label>
          <div class="relative">
            <input id="password" :type="show?'text':'password'" class="input" style="padding-right:44px" x-model="password" placeholder="••••••" autocomplete="new-password" />
            <button type="button" class="icon-btn" style="position:absolute;right:2px;top:50%;transform:translateY(-50%)" @click="show=!show" :aria-label="show?'Ẩn mật khẩu':'Hiện mật khẩu'">
              <svg x-show="!show" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg x-show="show" x-cloak width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.9 4.2A9.1 9.1 0 0 1 12 4c6.5 0 10 7 10 7a13 13 0 0 1-2.2 3M6.6 6.6A13 13 0 0 0 2 11s3.5 7 10 7a9 9 0 0 0 3.4-.6M1 1l22 22"/></svg>
            </button>
          </div>
          <!-- strength bar -->
          <div x-show="password.length>0" x-cloak class="mt-2">
            <div class="flex gap-1">
              <template x-for="i in 4" :key="i">
                <div class="flex-1 rounded-full" style="height:5px" :style="`background:${i<=strength ? strengthColor : 'var(--surface)'}`"></div>
              </template>
            </div>
            <span class="text-xs mt-1 block" :style="`color:${strengthColor}`" x-text="strengthLabel"></span>
          </div>
          <span class="field-error" x-show="errors.password" x-text="errors.password" x-cloak></span>
        </div>
        <div class="mb-4">
          <label class="field-label" for="confirm">Xác nhận mật khẩu</label>
          <input id="confirm" :type="show?'text':'password'" class="input" x-model="confirm" placeholder="••••••" autocomplete="new-password" />
          <span class="field-error" x-show="errors.confirm" x-text="errors.confirm" x-cloak></span>
        </div>
        <div class="mb-5">
          <label class="flex items-start gap-2 text-sm text-2 cursor-pointer">
            <input type="checkbox" x-model="agree" class="mt-1" />
            <span>Tôi đồng ý với <a href="#" class="text-1 underline">Điều khoản sử dụng</a> và <a href="#" class="text-1 underline">Chính sách bảo mật</a>.</span>
          </label>
          <span class="field-error" x-show="errors.agree" x-text="errors.agree" x-cloak></span>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Tạo tài khoản</button>
      </form>

      <p class="text-center text-sm text-2 mt-6">
        Đã có tài khoản? <a href="login.html" class="text-1 font-medium hover:underline">Đăng nhập</a>
      </p>
    </div>
  </main>
</body>
</html>
