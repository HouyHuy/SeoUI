<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chi tiết sản phẩm | STORE</title>
  <meta name="description" content="Xem chi tiết sản phẩm: hình ảnh, giá, màu sắc, kích cỡ và đánh giá. Thêm vào giỏ và mua ngay tại STORE." />
  <meta name="keywords" content="chi tiết sản phẩm, thời trang, mua sắm" />
  <meta name="author" content="STORE" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://store.example.com/product.html" />
  <meta property="og:type" content="product" />
  <meta property="og:title" content="Chi tiết sản phẩm | STORE" />
  <meta property="og:description" content="Xem chi tiết sản phẩm tại STORE." />
  <meta property="og:site_name" content="STORE" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script>(function(){try{if(localStorage.getItem('theme')==='dark')document.documentElement.dataset.theme='dark';}catch(e){}})();</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: {
      colors: { bg:'var(--bg)','bg-2':'var(--bg-2)','bg-3':'var(--bg-3)',surface:'var(--surface)',t1:'var(--text-1)',t2:'var(--text-2)',t3:'var(--text-3)',accent:'var(--accent)','accent-fg':'var(--accent-fg)' },
      fontFamily: { sans: ['Inter','system-ui','sans-serif'] } } } };
  </script>
  <link rel="stylesheet" href="css/style.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</head>

<body class="font-sans">
  <a href="#main" class="skip-link">Bỏ qua tới nội dung chính</a>

  <!-- HEADER -->
  <header class="site-header" x-data="header">
    <div class="container-c h-16 flex items-center justify-between gap-4">
      <a href="index.html" class="logo">STORE</a>
      <nav class="hidden md:flex items-center gap-8" aria-label="Điều hướng chính">
        <a href="index.html" class="nav-link">Trang chủ</a>
        <a href="index.html#products" class="nav-link">Sản phẩm</a>
        <a href="contact.html" class="nav-link">Liên hệ</a>
      </nav>
      <div class="flex items-center gap-1">
        <a href="cart.html" class="icon-btn" aria-label="Giỏ hàng">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.6 13a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
          <span class="cart-badge" x-show="$store.cart.count > 0" x-text="$store.cart.count" x-cloak></span>
        </a>
        <button class="icon-btn" @click="$store.theme.toggle()" aria-label="Chuyển giao diện sáng/tối">
          <svg x-show="!$store.theme.isDark" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg x-show="$store.theme.isDark" x-cloak width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <a href="login.html" class="icon-btn hidden sm:grid" aria-label="Đăng nhập">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 1 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <button class="icon-btn md:hidden" @click="open()" aria-label="Mở menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
      </div>
    </div>
    <template x-teleport="body">
      <div x-show="mobileOpen" x-cloak>
        <div class="drawer-overlay" @click="close()"></div>
        <aside class="drawer">
          <div class="flex items-center justify-between mb-8">
            <span class="logo">STORE</span>
            <button class="icon-btn" @click="close()" aria-label="Đóng menu">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>
          <nav class="flex flex-col gap-2">
            <a href="index.html" class="py-2 nav-link">Trang chủ</a>
            <a href="index.html#products" class="py-2 nav-link">Sản phẩm</a>
            <a href="contact.html" class="py-2 nav-link">Liên hệ</a>
            <a href="login.html" class="py-2 nav-link">Đăng nhập</a>
          </nav>
        </aside>
      </div>
    </template>
  </header>

  <main id="main" class="container-c py-8"
        x-data="productPage()" x-init="init()">

    <!-- Not found state -->
    <template x-if="!product">
      <div class="text-center py-24">
        <h1 class="text-2xl font-semibold mb-3">Không tìm thấy sản phẩm</h1>
        <p class="text-2 mb-6">Sản phẩm bạn tìm có thể đã bị gỡ hoặc không tồn tại.</p>
        <a href="index.html#products" class="btn btn-primary">Quay lại cửa hàng</a>
      </div>
    </template>

    <template x-if="product">
      <div>
        <!-- Breadcrumb -->
        <nav class="text-sm text-2 mb-6 flex items-center gap-2 flex-wrap" aria-label="Breadcrumb">
          <a href="index.html" class="hover:text-t1">Trang chủ</a>
          <span class="text-3">›</span>
          <a href="index.html#products" class="hover:text-t1">Sản phẩm</a>
          <span class="text-3">›</span>
          <span class="text-1" x-text="product.name"></span>
        </nav>

        <div class="grid lg:grid-cols-5 gap-10">
          <!-- Gallery (60%) -->
          <div class="lg:col-span-3">
            <div class="bg-2 rounded-lg-c flex items-center justify-center mb-4" style="aspect-ratio:1/1">
              <span class="text-3" style="font-size:120px;opacity:.25" x-text="product.name.charAt(0)"></span>
            </div>
            <div class="grid grid-cols-4 gap-3">
              <template x-for="i in 4" :key="i">
                <button class="bg-2 rounded-c flex items-center justify-center transition"
                        :style="`aspect-ratio:1/1; border:2px solid ${activeThumb===i ? 'var(--accent)' : 'transparent'}`"
                        @click="activeThumb = i" :aria-label="`Ảnh ${i}`">
                  <span class="text-3 text-2xl opacity-30" x-text="product.name.charAt(0)"></span>
                </button>
              </template>
            </div>
          </div>

          <!-- Info (40%) -->
          <div class="lg:col-span-2">
            <h1 class="text-3xl font-semibold mb-3" x-text="product.name"></h1>
            <div class="flex items-center gap-3 mb-4">
              <span class="text-2xl font-bold" x-text="formatPrice(product.price)"></span>
              <span x-show="product.oldPrice" class="text-3 line-through" x-text="product.oldPrice ? formatPrice(product.oldPrice) : ''" x-cloak></span>
            </div>
            <div class="flex items-center gap-2 mb-6 text-sm">
              <span class="stars" x-text="renderStars(product.rating)"></span>
              <a href="#reviews" class="text-2 hover:text-t1" x-text="`${product.reviews} đánh giá`"></a>
            </div>

            <!-- Colors -->
            <div class="mb-5">
              <p class="field-label">Màu sắc</p>
              <div class="flex gap-3">
                <template x-for="(c, idx) in product.colors" :key="idx">
                  <button @click="color = idx"
                          class="rounded-full transition"
                          :style="`width:32px;height:32px;background:${c};border:2px solid ${color===idx ? 'var(--accent)':'var(--border)'};box-shadow:0 0 0 2px var(--bg) inset`"
                          :aria-label="`Màu ${idx+1}`" :aria-pressed="color===idx"></button>
                </template>
              </div>
            </div>

            <!-- Sizes -->
            <div class="mb-5">
              <p class="field-label">Kích cỡ</p>
              <div class="flex flex-wrap gap-2">
                <template x-for="s in product.sizes" :key="s">
                  <button @click="size = s"
                          class="btn"
                          :class="size===s ? 'btn-primary' : 'btn-outline'"
                          style="padding:8px 16px;min-width:48px" x-text="s" :aria-pressed="size===s"></button>
                </template>
              </div>
            </div>

            <!-- Quantity -->
            <div class="mb-6">
              <p class="field-label">Số lượng</p>
              <div class="inline-flex items-center border-c rounded-c overflow-hidden">
                <button class="icon-btn" @click="qty = Math.max(1, qty-1)" aria-label="Giảm số lượng">−</button>
                <input type="number" min="1" class="text-center bg-transparent" style="width:56px;border:0;outline:none" x-model.number="qty" aria-label="Số lượng" />
                <button class="icon-btn" @click="qty = qty+1" aria-label="Tăng số lượng">+</button>
              </div>
            </div>

            <!-- CTA -->
            <div class="flex gap-3 mb-4">
              <button class="btn btn-outline btn-block" @click="addToCart()">Thêm vào giỏ</button>
              <button class="btn btn-primary btn-block" @click="buyNow()">Mua ngay</button>
            </div>

            <!-- Wishlist -->
            <button class="flex items-center gap-2 text-2 hover:text-t1 mb-6" @click="wish = !wish" :aria-pressed="wish">
              <svg width="18" height="18" viewBox="0 0 24 24" :fill="wish ? 'currentColor':'none'" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.7l-1-1.1a5.5 5.5 0 1 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
              <span x-text="wish ? 'Đã yêu thích' : 'Thêm vào yêu thích'"></span>
            </button>

            <hr class="divider mb-4" />
            <p class="text-2 text-sm" x-text="product.short"></p>
          </div>
        </div>

        <!-- Tabs -->
        <section class="mt-16" x-data="{ tab: 'desc' }">
          <div class="flex gap-6 border-b-c mb-6">
            <button class="pb-3 -mb-px transition" :class="tab==='desc' ? 'border-b-2 text-t1 font-medium' : 'text-2'" style="border-color:var(--accent)" @click="tab='desc'">Mô tả đầy đủ</button>
            <button class="pb-3 -mb-px transition" :class="tab==='spec' ? 'border-b-2 text-t1 font-medium' : 'text-2'" style="border-color:var(--accent)" @click="tab='spec'">Thông số</button>
            <button class="pb-3 -mb-px transition" :class="tab==='rev' ? 'border-b-2 text-t1 font-medium' : 'text-2'" style="border-color:var(--accent)" @click="tab='rev'">Đánh giá (3)</button>
          </div>
          <div x-show="tab==='desc'" x-transition class="text-2 max-w-3xl leading-relaxed" x-text="product.description"></div>
          <div x-show="tab==='spec'" x-cloak x-transition class="max-w-xl">
            <table class="w-full text-sm">
              <tbody>
                <template x-for="(val, key) in product.specs" :key="key">
                  <tr class="border-b-c">
                    <td class="py-3 text-2 capitalize" x-text="key"></td>
                    <td class="py-3 text-1 text-right" x-text="val"></td>
                  </tr>
                </template>
              </tbody>
            </table>
          </div>
          <div x-show="tab==='rev'" x-cloak x-transition class="max-w-3xl flex flex-col gap-5">
            <template x-for="r in [
              {name:'Hoàng Nam', stars:5, text:'Sản phẩm đúng mô tả, chất lượng tốt. Rất hài lòng!'},
              {name:'Lan Phương', stars:4, text:'Đẹp, giao nhanh. Trừ 1 sao vì hộp hơi móp nhẹ.'},
              {name:'Đức Trí', stars:5, text:'Mua lần 2 rồi, vẫn ưng. Sẽ giới thiệu bạn bè.'}
            ]" :key="r.name">
              <div class="card p-5">
                <div class="flex items-center justify-between mb-1">
                  <span class="font-medium" x-text="r.name"></span>
                  <span class="stars" x-text="renderStars(r.stars)"></span>
                </div>
                <p class="text-2 text-sm" x-text="r.text"></p>
              </div>
            </template>
          </div>
        </section>

        <!-- Related -->
        <section class="mt-16">
          <h2 class="text-2xl font-semibold mb-6">Sản phẩm liên quan</h2>
          <div class="hscroll">
            <template x-for="rp in related" :key="rp.id">
              <a :href="`product.html?id=${rp.id}`" class="product-card flex flex-col" style="width:240px">
                <div class="product-thumb"><span class="text-4xl opacity-30" x-text="rp.name.charAt(0)"></span></div>
                <div class="p-4">
                  <p class="font-medium mb-1" x-text="rp.name"></p>
                  <span class="font-semibold" x-text="formatPrice(rp.price)"></span>
                </div>
              </a>
            </template>
          </div>
        </section>
      </div>
    </template>
  </main>

  <!-- Toast -->
  <div x-data="toast" @add-toast.window="fire($event.detail)">
    <div x-show="show" x-cloak x-transition class="toast" x-text="message" role="status"></div>
  </div>

  <!-- FOOTER -->
  <footer class="border-t-c bg-2 mt-20">
    <div class="container-c py-14 grid gap-10 md:grid-cols-3">
      <div>
        <p class="logo mb-3">STORE</p>
        <p class="text-2 text-sm max-w-xs">Thời trang tối giản cho cuộc sống hiện đại.</p>
      </div>
      <div>
        <p class="font-medium mb-3">Liên kết</p>
        <ul class="flex flex-col gap-2 text-sm text-2">
          <li><a href="index.html" class="hover:text-t1">Trang chủ</a></li>
          <li><a href="index.html#products" class="hover:text-t1">Sản phẩm</a></li>
          <li><a href="contact.html" class="hover:text-t1">Liên hệ</a></li>
        </ul>
      </div>
      <div>
        <p class="font-medium mb-3">Hỗ trợ</p>
        <p class="text-2 text-sm">Email: hello@store.example.com<br />Hotline: 1900 1234</p>
      </div>
    </div>
    <div class="border-t-c"><p class="container-c py-5 text-center text-sm text-3">© 2026 STORE. Đã đăng ký bản quyền.</p></div>
  </footer>

  <script>
    function productPage() {
      return {
        product: null,
        related: [],
        activeThumb: 1,
        color: 0,
        size: null,
        qty: 1,
        wish: false,
        init() {
          const id = new URLSearchParams(location.search).get("id") || 1;
          this.product = getProductById(id);
          if (this.product) {
            this.size = this.product.sizes[0];
            document.title = `${this.product.name} | STORE`;
            const md = document.querySelector('meta[name="description"]');
            if (md) md.setAttribute("content", this.product.short);
            this.related = window.products.filter(p => p.id !== this.product.id).slice(0, 6);
          }
        },
        addToCart() {
          this.product && $store.cart.add(this.product, this.qty, {
            color: this.product.colors[this.color], size: this.size
          });
          window.dispatchEvent(new CustomEvent("add-toast", { detail: "Đã thêm vào giỏ hàng!" }));
        },
        buyNow() {
          this.addToCart();
          setTimeout(() => (window.location.href = "cart.html"), 400);
        }
      };
    }
  </script>
</body>
</html>
